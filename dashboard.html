<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Mining Ship Inspeksi</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c1117;--surface:#161b22;--surface2:#1c2128;
  --border:#30363d;--border2:#21262d;
  --accent:#f0a500;--accent2:#e05c00;
  --text:#e6edf3;--muted:#8b949e;--muted2:#6e7681;
  --green:#3fb950;--red:#f85149;--blue:#58a6ff;
  --yellow:#d29922;--purple:#bc8cff;--teal:#39d353;
  --sidebar:220px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex}

/* SIDEBAR */
.sidebar{
  width:var(--sidebar);min-height:100vh;
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  position:fixed;top:0;left:0;bottom:0;
  z-index:100;
}
.sidebar-brand{
  padding:18px 16px 14px;
  border-bottom:1px solid var(--border);
}
.brand-row{display:flex;align-items:center;gap:10px}
.brand-icon{
  width:34px;height:34px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;
}
.brand-name{font-size:13px;font-weight:600;line-height:1.2}
.brand-sub{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace}

.user-card{
  margin:12px;padding:10px 12px;
  background:var(--surface2);border-radius:8px;
  border:1px solid var(--border);
}
.user-name{font-size:13px;font-weight:500}
.user-role{
  display:inline-flex;align-items:center;gap:4px;
  font-size:10px;font-weight:600;
  padding:2px 8px;border-radius:20px;margin-top:4px;
}
.role-pic{background:rgba(63,185,80,.15);color:var(--green)}
.role-admin{background:rgba(240,165,0,.15);color:var(--accent)}
.role-viewer{background:rgba(88,166,255,.15);color:var(--blue)}
.user-area{font-size:10px;color:var(--muted);margin-top:4px}

/* NAV */
.nav{flex:1;padding:8px 8px;overflow-y:auto}
.nav-section{
  font-size:10px;font-weight:600;
  color:var(--muted2);letter-spacing:.8px;
  text-transform:uppercase;
  padding:10px 8px 6px;
}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 10px;border-radius:6px;
  cursor:pointer;font-size:13px;
  color:var(--muted);transition:all .15s;
  margin-bottom:2px;
}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:rgba(240,165,0,.12);color:var(--accent)}
.nav-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.nav-badge{
  margin-left:auto;
  background:var(--red);color:#fff;
  font-size:10px;font-weight:600;
  padding:1px 6px;border-radius:20px;
}

.sidebar-footer{
  padding:12px;border-top:1px solid var(--border);
}
.btn-logout{
  width:100%;padding:8px;
  background:transparent;border:1px solid var(--border);
  border-radius:6px;color:var(--muted);
  font-family:'Inter',sans-serif;font-size:12px;cursor:pointer;
  transition:all .15s;
}
.btn-logout:hover{border-color:var(--red);color:var(--red)}

/* MAIN */
.main{margin-left:var(--sidebar);flex:1;min-height:100vh}
.topbar{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:12px 24px;
  display:flex;align-items:center;gap:12px;
  position:sticky;top:0;z-index:50;
}
.topbar-title{font-size:15px;font-weight:600}
.topbar-sub{font-size:12px;color:var(--muted)}
.topbar-actions{margin-left:auto;display:flex;gap:8px}
.btn-sm{
  padding:7px 14px;border-radius:6px;font-size:12px;font-weight:500;
  cursor:pointer;border:1px solid var(--border);
  background:var(--surface2);color:var(--muted);
  font-family:'Inter',sans-serif;transition:all .15s;
  text-decoration:none;display:inline-flex;align-items:center;gap:5px;
}
.btn-sm:hover{border-color:var(--accent);color:var(--accent)}
.btn-primary{
  background:var(--accent);color:#000;border-color:var(--accent);
}
.btn-primary:hover{background:#e09500;color:#000;border-color:#e09500}

.content{padding:24px;max-width:1200px}

/* PAGES */
.page{display:none}.page.active{display:block}

/* STATS */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:16px 18px;
  position:relative;overflow:hidden;
}
.stat-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
}
.stat-card.red::before{background:var(--red)}
.stat-card.yellow::before{background:var(--yellow)}
.stat-card.green::before{background:var(--green)}
.stat-card.blue::before{background:var(--blue)}
.stat-n{font-size:28px;font-weight:600;font-family:'JetBrains Mono',monospace;line-height:1}
.stat-l{font-size:12px;color:var(--muted);margin-top:6px}
.stat-sub{font-size:11px;margin-top:4px}

/* SECTION */
.section-hdr{
  display:flex;align-items:center;gap:10px;
  margin-bottom:14px;
}
.section-title{font-size:14px;font-weight:600}
.section-count{font-size:12px;color:var(--muted)}

/* TABLE */
.tbl-wrap{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;overflow:hidden;
}
.tbl-filter{
  padding:12px 16px;border-bottom:1px solid var(--border);
  display:flex;gap:8px;align-items:center;flex-wrap:wrap;
}
.filter-select,.filter-input{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:6px;padding:6px 10px;color:var(--text);
  font-family:'Inter',sans-serif;font-size:12px;outline:none;
  transition:border-color .15s;
}
.filter-select:focus,.filter-input:focus{border-color:var(--accent)}
.filter-input{flex:1;min-width:140px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{
  padding:10px 12px;background:var(--surface2);
  color:var(--muted);font-weight:500;text-align:left;
  border-bottom:1px solid var(--border);font-size:11px;
  white-space:nowrap;
}
td{padding:10px 12px;border-bottom:1px solid var(--border2);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap}
.b-open{background:rgba(248,81,73,.15);color:var(--red);border:1px solid rgba(248,81,73,.3)}
.b-closed{background:rgba(63,185,80,.15);color:var(--green);border:1px solid rgba(63,185,80,.3)}
.b-crit{background:rgba(188,140,255,.15);color:var(--purple)}
.b-high{background:rgba(248,81,73,.15);color:var(--red)}
.b-med{background:rgba(210,153,34,.15);color:var(--yellow)}
.b-low{background:rgba(63,185,80,.15);color:var(--green)}
.b-overdue{background:rgba(248,81,73,.2);color:var(--red);border:1px solid rgba(248,81,73,.4)}
.b-ontime{background:rgba(63,185,80,.1);color:var(--green)}
.b-upcoming{background:rgba(210,153,34,.1);color:var(--yellow)}

.mono{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted)}

/* TEMUAN DETAIL DRAWER */
.drawer-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.drawer-bg.open{opacity:1;pointer-events:all}
.drawer{
  position:fixed;right:0;top:0;bottom:0;width:480px;
  background:var(--surface);border-left:1px solid var(--border);
  z-index:201;
  transform:translateX(100%);transition:transform .25s cubic-bezier(.16,1,.3,1);
  display:flex;flex-direction:column;overflow:hidden;
}
.drawer.open{transform:translateX(0)}
.drawer-head{
  padding:16px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;
}
.drawer-title{font-size:14px;font-weight:600;flex:1}
.drawer-close{
  width:28px;height:28px;border-radius:6px;
  background:var(--surface2);border:1px solid var(--border);
  cursor:pointer;color:var(--muted);font-size:14px;
  display:flex;align-items:center;justify-content:center;
}
.drawer-body{flex:1;overflow-y:auto;padding:20px}
.drawer-footer{
  padding:16px 20px;border-top:1px solid var(--border);
  display:flex;gap:8px;
}

/* CLOSE FORM inside drawer */
.close-section{
  background:rgba(63,185,80,.05);
  border:1px solid rgba(63,185,80,.2);
  border-radius:10px;padding:16px;margin-top:16px;
}
.close-section h4{font-size:13px;font-weight:600;color:var(--green);margin-bottom:12px}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.field label{font-size:11px;color:var(--muted);font-weight:500;letter-spacing:.3px}
.field input,.field select,.field textarea{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:6px;padding:8px 10px;color:var(--text);
  font-family:'Inter',sans-serif;font-size:12px;outline:none;
  transition:border-color .15s;width:100%;
}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--green)}
.field textarea{resize:none}
.upload-zone{
  border:1px dashed var(--border);border-radius:8px;
  padding:16px;text-align:center;cursor:pointer;
  font-size:12px;color:var(--muted);transition:all .15s;
  position:relative;
}
.upload-zone:hover{border-color:var(--green);color:var(--green)}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%}
.photo-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.photo-thumb{width:60px;height:60px;border-radius:6px;object-fit:cover;border:1px solid var(--border)}
.btn-close-temuan{
  flex:1;padding:10px;background:var(--green);color:#fff;
  border:none;border-radius:8px;font-family:'Inter',sans-serif;
  font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;
}
.btn-close-temuan:hover{background:#2ea043}
.btn-close-temuan:disabled{background:var(--muted);cursor:not-allowed}

/* INFO ROWS */
.info-row{display:flex;gap:6px;margin-bottom:8px;font-size:12px}
.info-key{color:var(--muted);min-width:110px;flex-shrink:0}
.info-val{color:var(--text);font-weight:500}

/* TIMELINE */
.timeline{margin-top:12px}
.tl-item{
  display:flex;gap:12px;margin-bottom:12px;
  position:relative;padding-left:20px;
}
.tl-item::before{
  content:'';position:absolute;left:5px;top:16px;
  width:1px;bottom:-12px;background:var(--border);
}
.tl-item:last-child::before{display:none}
.tl-dot{
  position:absolute;left:0;top:3px;
  width:10px;height:10px;border-radius:50%;
  background:var(--border);flex-shrink:0;
}
.tl-dot.open{background:var(--red)}
.tl-dot.closed{background:var(--green)}
.tl-text{font-size:12px}
.tl-time{font-size:10px;color:var(--muted);margin-top:2px;font-family:'JetBrains Mono',monospace}

/* MASTER CARDS for admin */
.master-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.master-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:16px;cursor:pointer;transition:all .15s;
}
.master-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.master-icon{font-size:24px;margin-bottom:8px}
.master-name{font-size:13px;font-weight:600}
.master-desc{font-size:11px;color:var(--muted);margin-top:3px}
.master-count{font-size:20px;font-weight:600;font-family:'JetBrains Mono',monospace;color:var(--accent);margin-top:8px}

/* ALERT BANNER */
.alert-banner{
  padding:10px 14px;border-radius:8px;margin-bottom:14px;
  font-size:12px;display:flex;align-items:center;gap:8px;
}
.ab-danger{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);color:var(--red)}
.ab-warn{background:rgba(210,153,34,.1);border:1px solid rgba(210,153,34,.3);color:var(--yellow)}

/* TOAST */
.toast{
  position:fixed;bottom:24px;right:24px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;padding:12px 16px;
  display:flex;align-items:center;gap:10px;
  font-size:13px;z-index:999;max-width:320px;
  box-shadow:0 8px 32px rgba(0,0,0,.5);
  transform:translateY(100px);opacity:0;
  transition:all .3s cubic-bezier(.16,1,.3,1);
}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{border-color:rgba(63,185,80,.5)}
.toast.error{border-color:rgba(248,81,73,.5)}

/* LOADER */
.loader{
  display:flex;align-items:center;justify-content:center;
  padding:48px;color:var(--muted);font-size:13px;gap:10px;
}
.dot-loader span{
  display:inline-block;width:6px;height:6px;border-radius:50%;
  background:var(--accent);margin:0 2px;
  animation:bounce .8s infinite;
}
.dot-loader span:nth-child(2){animation-delay:.15s}
.dot-loader span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}

/* EMPTY STATE */
.empty{text-align:center;padding:48px 24px;color:var(--muted)}
.empty-icon{font-size:36px;margin-bottom:12px}
.empty-title{font-size:14px;font-weight:500;color:var(--text);margin-bottom:6px}

/* RESPONSIVE */
@media(max-width:900px){
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .master-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<!-- TOAST -->
<div class="toast" id="toast"><span id="toastIcon">✅</span><span id="toastMsg"></span></div>

<!-- DRAWER BG -->
<div class="drawer-bg" id="drawerBg" onclick="closeDrawer()"></div>

<!-- TEMUAN DRAWER -->
<div class="drawer" id="drawer">
  <div class="drawer-head">
    <div class="drawer-title" id="drawerTitle">Detail Temuan</div>
    <div id="drawerBadge"></div>
    <div class="drawer-close" onclick="closeDrawer()">✕</div>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
  <div class="drawer-footer" id="drawerFooter"></div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-brand">
    <div class="brand-row">
      <div class="brand-icon">⛏️</div>
      <div>
        <div class="brand-name">Mining Ship</div>
        <div class="brand-sub">INSPEKSI MONITOR</div>
      </div>
    </div>
  </div>

  <div class="user-card">
    <div class="user-name" id="userName">Loading...</div>
    <div class="user-role" id="userRoleBadge">—</div>
    <div class="user-area" id="userArea"></div>
  </div>

  <nav class="nav" id="navMenu">
    <!-- Rendered by JS based on role -->
  </nav>

  <div class="sidebar-footer">
    <button class="btn-logout" onclick="doLogout()">← Keluar</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div>
      <div class="topbar-title" id="topbarTitle">Dashboard</div>
      <div class="topbar-sub" id="topbarSub"></div>
    </div>
    <div class="topbar-actions" id="topbarActions"></div>
  <div id="emailBanner" style="display:none;background:var(--color-background-info);border-bottom:0.5px solid var(--color-border-info);padding:8px 24px;font-size:12px;color:var(--color-text-info);display:none;align-items:center;gap:8px">
    📧 Dibuka dari link email — temuan sedang dimuat...
  </div>
  </div>

  <div class="content">

    <!-- PAGE: OVERVIEW (PIC & Admin) -->
    <div class="page active" id="page-overview">
      <div id="alertBanners"></div>
      <div class="stat-grid" id="statGrid"></div>
      <div class="section-hdr">
        <div class="section-title">Temuan Terbaru</div>
        <span class="section-count" id="temuanCount"></span>
      </div>
      <div class="tbl-wrap">
        <div class="tbl-filter">
          <select class="filter-select" id="filterStatus" onchange="filterTemuan()">
            <option value="">Semua status</option>
            <option value="OPEN">Open</option>
            <option value="CLOSED">Closed</option>
          </select>
          <select class="filter-select" id="filterRisiko" onchange="filterTemuan()">
            <option value="">Semua risiko</option>
            <option>CRITICAL</option><option>HIGH</option>
            <option>MEDIUM</option><option>LOW</option>
          </select>
          <input class="filter-input" id="searchTemuan" placeholder="🔍 Cari alat, area, pertanyaan..." oninput="filterTemuan()">
        </div>
        <div id="temuanTableWrap">
          <div class="loader"><div class="dot-loader"><span></span><span></span><span></span></div> Memuat data...</div>
        </div>
      </div>
    </div>

    <!-- PAGE: JADWAL -->
    <div class="page" id="page-jadwal">
      <div class="section-hdr">
        <div class="section-title">Jadwal Inspeksi</div>
      </div>
      <div class="tbl-wrap">
        <div id="jadwalTableWrap">
          <div class="loader"><div class="dot-loader"><span></span><span></span><span></span></div> Memuat jadwal...</div>
        </div>
      </div>
    </div>

    <!-- PAGE: MASTER (Admin only) -->
    <div class="page" id="page-master">
      <div class="master-grid" id="masterGrid"></div>
      <div class="section-hdr">
        <div class="section-title">Activity Log Terbaru</div>
      </div>
      <div class="tbl-wrap">
        <div id="logTableWrap">
          <div class="loader"><div class="dot-loader"><span></span><span></span><span></span></div></div>
        </div>
      </div>
    </div>

    <!-- PAGE: EMPLOYEE (Admin only) -->
    <div class="page" id="page-employee">
      <div class="tbl-wrap">
        <div class="tbl-filter">
          <input class="filter-input" id="searchEmp" placeholder="🔍 Cari nama / email..." oninput="filterEmployee()">
          <select class="filter-select" id="filterRole" onchange="filterEmployee()">
            <option value="">Semua role</option>
            <option>INSPECTOR</option><option>PIC</option>
            <option>ADMIN</option><option>VIEWER</option>
          </select>
        </div>
        <div id="empTableWrap">
          <div class="loader"><div class="dot-loader"><span></span><span></span><span></span></div></div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxBtHEXIvc2iTV3l_QnNsUJDqwTBNgy9IuIgO7id0QDpkeNUxrR6mMuuJX2XYI1ZsxmWQ/exec';

// ── SESSION ──────────────────────────────────────────────
let SESSION = null;
let allTemuan = [];
let allJadwal = [];
let allEmployee = [];

// ── NAV CONFIG per role ──────────────────────────────────
const NAV_CONFIG = {
  PIC: [
    { id:'overview', icon:'🏠', label:'Dashboard', section:null },
    { id:'jadwal',   icon:'📅', label:'Jadwal Inspeksi', section:null },
  ],
  ADMIN: [
    { id:'overview', icon:'🏠', label:'Overview', section:null },
    { id:'jadwal',   icon:'📅', label:'Jadwal Inspeksi', section:null },
    { id:'master',   icon:'🗄️', label:'Master Data', section:'ADMIN' },
    { id:'employee', icon:'👥', label:'Employee & PIC', section:'ADMIN' },
  ],
  VIEWER: [
    { id:'overview', icon:'🏠', label:'Dashboard', section:null },
    { id:'jadwal',   icon:'📅', label:'Jadwal Inspeksi', section:null },
  ],
};

// ── INIT ──────────────────────────────────────────────────
window.onload = async () => {
  const raw = localStorage.getItem('msm_session');

  // Ambil URL param
  const urlParams = new URLSearchParams(window.location.search);
  const targetInspeksi = urlParams.get('inspeksi');

  // Belum login → simpan target dulu, redirect ke login
  if (!raw) {
    if (targetInspeksi) {
      sessionStorage.setItem('redirect_inspeksi', targetInspeksi);
    }
    window.location.href = 'login.html';
    return;
  }

  // Cek session expired (8 jam)
  SESSION = JSON.parse(raw);
  const loginAge = (new Date() - new Date(SESSION.login_at)) / 1000 / 60 / 60;
  if (loginAge > 8) {
    localStorage.removeItem('msm_session');
    if (targetInspeksi) sessionStorage.setItem('redirect_inspeksi', targetInspeksi);
    window.location.href = 'login.html';
    return;
  }

  renderSidebar();
  await loadData();

  // Setelah data load, cek apakah ada target inspeksi
  const redirectTarget = targetInspeksi || sessionStorage.getItem('redirect_inspeksi');
  if (redirectTarget) {
    sessionStorage.removeItem('redirect_inspeksi');
    // Cari temuan berdasarkan inspeksi_id
    const target = allTemuan.find(t => t.inspeksi_id === redirectTarget);
    if (target) {
      openDrawer(target.temuan_id);
      showToast('📋 Membuka temuan dari link email', 'success');
    } else {
      showToast('⚠️ Temuan tidak ditemukan atau sudah closed', 'warn');
    }
  }
};

function renderSidebar() {
  document.getElementById('userName').textContent = SESSION.nama;
  document.getElementById('userArea').textContent = SESSION.role === 'PIC' ? 'Area: ' + (SESSION.subarea_id || 'Semua') : '';

function goPage(pageId, navEl) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

  if (navEl) navEl.classList.add('active');

  const titles = {
    overview:'Dashboard', jadwal:'Jadwal Inspeksi',
    master:'Master Data', employee:'Employee & PIC'
  };
  document.getElementById('topbarTitle').textContent = titles[pageId] || 'Dashboard';

  if (pageId === 'master') renderMaster();
  if (pageId === 'employee') renderEmployee();
}

async function loadData() {

    if (SESSION.role === 'PIC') params.append('pic_nik', SESSION.nik);

    const res = await fetch(APPS_SCRIPT_URL + '?' + params);

function filterTemuan() {
  const status = document.getElementById('filterStatus').value;
  const risiko = document.getElementById('filterRisiko').value;

  const filtered = allTemuan.filter(t => {

    if (risiko && t.risiko !== risiko) return false;
    if (q && !t.pertanyaan?.toLowerCase().includes(q) &&
             !t.nama_alat?.toLowerCase().includes(q) &&
             !t.nama_subarea?.toLowerCase().includes(q)) return false;
    return true;
  });
  renderTemuanTable(filtered);
}

let fotoCloseFiles = [];
function handleFotoClose(input) {
  fotoCloseFiles = Array.from(input.files).slice(0, 3);
  const preview = document.getElementById('photoPreview');
  preview.innerHTML = '';
  fotoCloseFiles.forEach(f => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = document.createElement('img');
      img.src = e.target.result;
      img.className = 'photo-thumb';
      preview.appendChild(img);
    };
    reader.readAsDataURL(f);
  });
}

async function submitClose(inspeksi_id) {
  const action = document.getElementById('closeAction')?.value.trim();
  if (!action) { showToast('Isi tindakan perbaikan dulu!', 'error'); return; }

  const btn = document.querySelector('.btn-close-temuan');
  if (btn) { btn.disabled = true; btn.textContent = 'Menyimpan...'; }

  // Compress & encode fotos
  const foto_data = [];
  for (const f of fotoCloseFiles) {
    const compressed = await compressImage(f);
    foto_data.push({ name: f.name, data: compressed.split(',')[1] });
  }

  const payload = {
    action: 'closeTemuan',
    inspeksi_id,
    nik_closer: SESSION.nik,
    tindakan_close: action,
    foto_close_data: foto_data
  };

  try {
    const res = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
    const json = await res.json();
    if (json.status === 'ok') {
      showToast(`✅ ${json.closed_count} temuan berhasil di-close!`, 'success');
      closeDrawer();
      await loadData();
    } else {
      showToast('Gagal: ' + json.message, 'error');
    }
  } catch(e) {
    // DEMO MODE
    allTemuan = allTemuan.map(t => {
      if (t.inspeksi_id === inspeksi_id && t.status_temuan === 'OPEN') {
        return { ...t, status_temuan:'CLOSED', tindakan_close:action, tgl_closed:new Date().toISOString().split('T')[0] };
      }
      return t;
    });
    showToast('[DEMO] Temuan berhasil di-close!', 'success');
    closeDrawer();
    renderStats();
    filterTemuan();
  }

  if (btn) { btn.disabled = false; btn.textContent = '✅ Close Temuan'; }
}

// ── COMPRESS IMAGE ────────────────────────────────────────
async function compressImage(file, quality = 0.7, maxPx = 1280) {
  return new Promise(resolve => {
    const img = new Image();
    const reader = new FileReader();
    reader.onload = e => {
      img.src = e.target.result;
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if (w > maxPx || h > maxPx) {
          if (w > h) { h = h/w*maxPx; w = maxPx; }
          else { w = w/h*maxPx; h = maxPx; }
        }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
    };
    reader.readAsDataURL(file);
  });
}
